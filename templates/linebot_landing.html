<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 한일 번역 봇 - LINE</title>
    <!-- 고품질 폰트 적용 -->
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        :root {
            --line-green: #00B900;
            --line-dark: #009900;
            --bg-color: #0d0d0d;
            --surface-color: rgba(255, 255, 255, 0.05);
            --text-primary: #f5f5f7;
            --text-secondary: #a1a1a6;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 배경의 몽환적인 그라데이션 및 빛 효과 */
        .background-gradient {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% -20%, rgba(0, 185, 0, 0.15) 0%, rgba(13, 13, 13, 1) 60%);
            z-index: 0;
        }

        .glow {
            position: absolute;
            width: 350px;
            height: 350px;
            background: var(--line-green);
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            animation: float 8s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes float {
            0% { transform: translate(-150px, -100px) scale(0.8); }
            100% { transform: translate(150px, 150px) scale(1.2); }
        }

        .container {
            position: relative;
            z-index: 10;
            background: var(--surface-color);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 3.5rem 2.5rem;
            max-width: 440px;
            width: 85%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            text-align: center;
            opacity: 0;
            transform: translateY(30px);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
        }

        .icon-box {
            width: 84px;
            height: 84px;
            background: linear-gradient(135deg, #1FE11F, var(--line-dark));
            border-radius: 24px;
            margin: 0 auto 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            box-shadow: 0 12px 24px rgba(0, 185, 0, 0.35);
            transform: scale(0.8);
            animation: popIn 0.8s 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes popIn {
            to { transform: scale(1); }
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            margin: 0 0 0.6rem;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #bbb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 1.05rem;
            color: var(--text-secondary);
            margin: 0 0 2.5rem;
            line-height: 1.6;
            font-weight: 400;
        }

        .feature-list {
            text-align: left;
            margin-bottom: 2.5rem;
        }

        .feature-item {
            display: flex;
            align-items: flex-start;
            gap: 1.2rem;
            padding: 1.2rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            margin-bottom: 1rem;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            opacity: 0;
            transform: translateX(-20px);
        }

        .feature-item:nth-child(1) { animation: slideRight 0.6s 0.4s forwards; }
        .feature-item:nth-child(2) { animation: slideRight 0.6s 0.5s forwards; }
        .feature-item:nth-child(3) { animation: slideRight 0.6s 0.6s forwards; }

        @keyframes slideRight {
            to { transform: translateX(0); opacity: 1; }
        }

        .feature-item:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .feature-icon {
            font-size: 1.6rem;
            line-height: 1.2;
        }

        .feature-text {
            font-size: 1.05rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.3rem;
        }

        .feature-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: var(--line-green);
            color: #fff;
            text-decoration: none;
            padding: 1.1rem 2.5rem;
            border-radius: 100px;
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 0.3px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 185, 0, 0.25);
            opacity: 0;
            animation: slideUp 0.8s 0.7s forwards;
            width: 100%;
            box-sizing: border-box;
        }

        .btn:hover {
            background: #00d100;
            box-shadow: 0 12px 28px rgba(0, 185, 0, 0.4);
            transform: translateY(-3px) scale(1.02);
        }
    </style>
</head>
<body>
    <div class="background-gradient"></div>
    <div class="glow"></div>
    
    <div class="container">
        <div class="icon-box">💬</div>
        <h1>스마트 통번역 봇</h1>
        <p class="subtitle">AI 기반의 자연스러운 번역과<br>학습 기능까지 한 번에 경험하세요.</p>

        <div class="feature-list">
            <div class="feature-item">
                <div class="feature-icon">✨</div>
                <div>
                    <div class="feature-text">초정밀 AI 양방향 번역</div>
                    <div class="feature-desc">문맥을 비유한 자연스러운 일본어 번역과 한국어 독음을 실시간으로 제공합니다.</div>
                </div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">🎓</div>
                <div>
                    <div class="feature-text">체계적인 일본어 학습</div>
                    <div class="feature-desc"><b>#학습</b>, <b>#퀴즈</b> 명령어로 언제 어디서나 단어와 회화 실력을 테스트해보세요.</div>
                </div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">🤖</div>
                <div>
                    <div class="feature-text">전문가급 AI 어시스턴트</div>
                    <div class="feature-desc"><b>#인공지능</b> 명령어를 입력하면 똑똑한 챗봇이 궁금증을 완벽하게 해결해 드립니다.</div>
                </div>
            </div>
        </div>

        <a href="https://line.me/ko/" class="btn">
            LINE에서 시작하기
        </a>
    </div>
</body>
</html>
